---
# Derrived from https://github.com/mrlesmithjr/ansible-ipset
# Might be nice to look into blocklists later

- name: ipset | install ipset package
  package:
    name:
     - ipset
    state: present
  register: ipset_install
  retries: 5
  until: ipset_install is success
  tags: install, ipset
  when:
    - ansible_distribution == "Ubuntu"

- name: ipset | install ipset persistent package ansible_distribution_major_version>18.04
  package:
    name:
     - ipset-persistent
    state: present
  register: ipset_install
  retries: 5
  until: ipset_install is success
  tags: install, ipset
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_major_version | int > 18


- name: configure | Capturing ipset Names
  command: ipset list -n
  become: true
  register: _ipset_list_names
  changed_when: false
  tags: ipset

# There are reports that on Ubuntu 24.04 netfilter-persistent is broken, so we use both /etc/ipset/ and /etc/iptables/
- name: ipset | Ensuring /etc/ipset/ Directory Exists for Ubuntu <=24
  file:
    path: "/etc/ipset/"
    state: directory
  tags: ipset
  when: ansible_distribution == "Ubuntu" and ansible_distribution_major_version | int <= 24

- name: ipset | Generating ipset config for Ubuntu <=24
  template:
    src: ipsets.j2
    dest: "/etc/ipset/ipsets"
  register: ipset_config
  tags: ipset
  when: ansible_distribution == "Ubuntu" and ansible_distribution_major_version | int <= 24

- name: ipset | Ensuring /etc/ipset/ Directory Exists
  file:
    path: "/etc/iptables/"
    state: directory
  tags: ipset

- name: ipset | Generating ipset config
  template:
    src: ipsets.j2
    dest: "/etc/iptables/ipsets"
  register: ipset_config
  tags: ipset

- name: ipset | Restoring ipset Rules
  shell: ipset restore -exist < /etc/iptables/ipsets
  when: ipset_config.changed
  tags: ipset
